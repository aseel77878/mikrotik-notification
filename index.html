
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>إشعارات ميكروتيك</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #07111f;
      color: white;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #101d2e;
      padding: 30px;
      border-radius: 20px;
    }

    h1 {
      color: #00d9ff;
    }

    .icon {
      font-size: 70px;
    }

    button {
      background: #00b8d4;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #0097a7;
    }

    #status {
      margin-top: 20px;
      line-height: 1.8;
    }

    #tokenBox {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: #07111f;
      border-radius: 10px;
      word-break: break-all;
      font-size: 12px;
    }
  </style>

</head>

<body>

  <div class="container">

    <div class="icon">🔔</div>

    <h1>نظام إشعارات الشبكة</h1>

    <p>
      مرحباً بك في خدمة إشعارات شبكة ميكروتيك
    </p>

    <p>
      قم بتفعيل الإشعارات لتصلك آخر أخبار الشبكة
      والتنبيهات المهمة.
    </p>

    <button id="notificationButton">
      تفعيل الإشعارات
    </button>

    <p id="status"></p>

    <div id="tokenBox"></div>

  </div>


  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";

    import {
      getMessaging,
      getToken,
      onMessage
    }
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-messaging.js";


    // ==============================
    // إعدادات Firebase
    // ==============================

    const firebaseConfig = {

      apiKey:
      "AIzaSyBngHPTFM-eC3k-g2nS1o9l-_hC2fZBhJg",

      authDomain:
      "mikrotik-notifications-86537.firebaseapp.com",

      projectId:
      "mikrotik-notifications-86537",

      storageBucket:
      "mikrotik-notifications-86537.firebasestorage.app",

      messagingSenderId:
      "216208799015",

      appId:
      "1:216208799015:web:7d5e1cb06b877b0d642502",

      measurementId:
      "G-DDWQ98LS8T"

    };


    // ==============================
    // تشغيل Firebase
    // ==============================

    const app = initializeApp(firebaseConfig);

    const messaging = getMessaging(app);


    // ==============================
    // مفتاح VAPID
    // ==============================

    const vapidKey =
    "BDqvN6cuWEY6ygF1ay1tuI5nAxfYjCPlzrpg5oh5FpPY9Pmq7GJpauWFNB-kSKepIVw92uTqKM1WeeEPOM_EQhY";


    // ==============================
    // عناصر الصفحة
    // ==============================

    const notificationButton =
    document.getElementById("notificationButton");

    const status =
    document.getElementById("status");

    const tokenBox =
    document.getElementById("tokenBox");


    // ==============================
    // عند الضغط على الزر
    // ==============================

    notificationButton.addEventListener(
      "click",
      enableNotifications
    );


    // ==============================
    // دالة تفعيل الإشعارات
    // ==============================

    async function enableNotifications() {

      if (!("Notification" in window)) {

        status.innerHTML =
        "❌ متصفحك لا يدعم الإشعارات";

        return;

      }


      if (!("serviceWorker" in navigator)) {

        status.innerHTML =
        "❌ المتصفح لا يدعم Service Worker";

        return;

      }


      try {

        status.innerHTML =
        "⏳ جاري طلب السماح بالإشعارات...";


        // طلب إذن الإشعارات

        const permission =
        await Notification.requestPermission();


        if (permission !== "granted") {

          status.innerHTML =
          "❌ لم يتم السماح بالإشعارات";

          return;

        }


        status.innerHTML =
        "⏳ جاري تسجيل خدمة الإشعارات...";


        // ==============================
        // تسجيل Service Worker
        // ==============================

        const registration =
        await navigator.serviceWorker.register(
          "./firebase-messaging-sw.js"
        );


        console.log(
          "تم تسجيل Service Worker:",
          registration
        );


        status.innerHTML =
        "⏳ جاري الحصول على رمز الجهاز...";


        // ==============================
        // الحصول على FCM Token
        // ==============================

        const currentToken =
        await getToken(
          messaging,
          {

            vapidKey: vapidKey,

            serviceWorkerRegistration:
            registration

          }
        );


        // ==============================
        // التحقق من Token
        // ==============================

        if (currentToken) {

          status.innerHTML =
          "✅ تم تفعيل الإشعارات بنجاح";


          console.log(
            "FCM Token:",
            currentToken
          );


          // إظهار Token على الصفحة

          tokenBox.style.display =
          "block";


          tokenBox.innerHTML =
          "<strong>رمز الجهاز FCM Token:</strong><br><br>"
          +
          currentToken;


          // تغيير نص الزر

          notificationButton.innerHTML =
          "✅ الإشعارات مفعلة";


          // إشعار تجريبي

          new Notification(
            "إشعارات ميكروتيك",
            {

              body:
              "مرحباً بك، تم تفعيل إشعارات الشبكة بنجاح 🔔"

            }
          );

        }

        else {

          status.innerHTML =
          "❌ لم يتم الحصول على FCM Token";

        }

      }

      catch (error) {

        console.error(
          "حدث خطأ:",
          error
        );


        status.innerHTML =
        "❌ حدث خطأ: "
        +
        error.message;

      }

    }


    // ==============================
    // استقبال الإشعارات
    // عندما تكون الصفحة مفتوحة
    // ==============================

    onMessage(
      messaging,
      (payload) => {

        console.log(
          "وصل إشعار:",
          payload
        );


        const title =
        payload.notification?.title
        ||
        "إشعارات ميكروتيك";


        const body =
        payload.notification?.body
        ||
        "وصل إشعار جديد 🔔";


        if (
          Notification.permission
          ===
          "granted"
        ) {

          new Notification(
            title,
            {

              body: body

            }
          );

        }

      }
    );

  </script>

</body>

</html>
